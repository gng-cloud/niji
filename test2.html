<!DOCTYPE html>
<html>
<head>
<style>
  .wrapper {
    width: 200px;
    height: 300px;
    overflow: hidden;
    border: 2px solid black;
    display: inline-block;
  }
  .photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #eee;
    --zoom: 1.3;
    --x: 0%;
    --y: 0%;
    transform: scale(var(--zoom)) translate(var(--x), var(--y));
    transform-origin: center center;
  }
</style>
</head>
<body>
  <!-- Herve -->
  <div class="wrapper">
    <img src="images/matthieu.png" class="photo" style="--zoom: 1.25; --x: 0%; --y: 0%;" />
  </div>
  <!-- Jordan -->
  <div class="wrapper">
    <img src="images/matthieu.png" class="photo" style="--zoom: 1.3; --x: -5%; --y: 10%;" />
  </div>
  <!-- Matthieu -->
  <div class="wrapper">
    <img src="images/matthieu.png" class="photo" style="--zoom: 1.4; --x: 0%; --y: -10%;" />
  </div>
  <!-- Gilbert -->
  <div class="wrapper">
    <img src="images/matthieu.png" class="photo" style="--zoom: 1.4; --x: 5%; --y: -5%;" />
  </div>
</body>
</html>
